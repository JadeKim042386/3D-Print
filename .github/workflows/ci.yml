name: CI

# NOTE (DPR-250, 2026-05-18): server/ canonical source has moved to homefix.git/server/.
# All deploy jobs (deploy-api, deploy-worker, deploy-frontend) are disabled here so
# commits to this repo no longer deploy to prod. CI is retained as a sanity check only.
# See: https://github.com/JadeKim042386/homefix/tree/main/server

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci-server:
    name: Server CI (read-only — canonical at homefix.git/server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  ci-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # Deploy jobs intentionally removed — see DPR-250. Canonical deploys now run from
  # https://github.com/JadeKim042386/homefix/.github/workflows/server-ci.yml
